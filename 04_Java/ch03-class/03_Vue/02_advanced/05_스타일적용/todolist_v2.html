<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoList APP</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/bootstrap@5.2.3/dist/css/bootstrap.min.css"
    />
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      .title {
        text-align: center;
        font-weight: bold;
        font-size: 20pt;
      }
      .todo-done {
        text-decoration: line-through;
        color: #adb5bd;
      }
      .container {
        padding: 20px;
      }
      .card-borderless {
        border: 0;
        box-shadow: none;
      }
      .pointer {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <div class="card card-body bg-light mb-3">
        <div class="title">:: TodoList App</div>
      </div>

      <div class="card card-default card-borderless">
        <div class="card-body">
          <div class="row mb-3">
            <div class="col">
              <div class="input-group">
                <input
                  type="text"
                  class="form-control"
                  placeholder="할 일을 입력하세요 (Enter)"
                  v-model.trim="todo"
                  @keyup.enter="addTodo"
                />
                <button class="btn btn-primary" @click="addTodo">추가</button>
              </div>
            </div>
          </div>

          <div class="row">
            <div class="col">
              <ul class="list-group">
                <li
                  v-for="todoitem in todolist"
                  :key="todoitem.id"
                  class="list-group-item d-flex justify-content-between align-items-center"
                  :class="{ 'list-group-item-success' : todoitem.completed }"
                >
                  <input
                    type="checkbox"
                    v-model="todoitem.completed"
                    @click.stop="toggleCompleted(todoitem.id)"
                  />
                  <!-- pointer 클래스 제거 (타이틀 클릭 제거)-->
                  <span :class="{ 'todo-done' : todoitem.completed }">
                    {{ todoitem.todo }} {{ todoitem.completed ? "(완료)" : "" }}
                  </span>

                  <span
                    class="badge bg-secondary pointer"
                    @click.stop="deleteTodo(todoitem.id)"
                  >
                    삭제
                  </span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const todo = ref('');
          const ts = new Date().getTime();

          // 초기 데이터
          const todolist = ref([
            { id: ts, todo: '자전거 타기', completed: false },
            { id: ts + 1, todo: '딸과 공원 산책', completed: true },
            { id: ts + 2, todo: '일요일 애견 카페', completed: false },
            { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
          ]);

          // 할 일 추가
          const addTodo = () => {
            if (todo.value.length >= 2) {
              todolist.value.push({
                id: new Date().getTime(),
                todo: todo.value,
                completed: false,
              });
              todo.value = '';
            }
          };

          // 할 일 삭제
          const deleteTodo = (id) => {
            let index = todolist.value.findIndex((item) => item.id === id);
            if (index !== -1) {
              todolist.value.splice(index, 1);
            }
          };

          // 완료 토글
          const toggleCompleted = (id) => {
            let index = todolist.value.findIndex((item) => item.id === id);
            // click 이벤트로 실행하므로 index가 무조건 있다고 가정 ( -1 예외 처리 x )

            todolist.value[index].completed = !todolist.value[index].completed;

            // completed 값 기준 오름차순 정렬 + 문자열 기준 정렬
            todolist.value.sort((a, b) => {
              if (a.completed !== b.completed) {
                return a.completed - b.completed;
              }
              return a.todo.localeCompare(b.todo);
            });
          };

          // 템플릿에 노출할 변수와 함수 반환
          return {
            todo,
            todolist,
            addTodo,
            deleteTodo,
            toggleCompleted,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
