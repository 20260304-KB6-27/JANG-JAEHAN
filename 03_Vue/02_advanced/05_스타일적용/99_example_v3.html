<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 게시판 목록</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>📌 게시판 목록 v3</h1>

      <div class="data-post">
        <input
          type="text"
          placeholder="새 게시글 제목"
          v-model="new_post.title"
          @keyup.enter.exact="addPost"
        />
        <input
          type="text"
          placeholder="새 게시글 내용"
          v-model="new_post.content"
          @keyup.enter.exact="addPost"
        />
        <button @click="addPost">작성</button>
      </div>

      <!-- 아래의 목록을 완성하세요 -->
      <ul v-for="post in posts" :key="post.no" :class="sortPost">
        <li class="post-item">
          {{post.no}}. {{post.title}}
          <span
            v-if="(selectedPost===null) || selectedPost.no !== post.no "
            @click="selectPost(post)"
            class="arrow"
          >
            ▼
          </span>
          <span
            v-else-if="selectedPost.no === post.no"
            @click="selectPost(post)"
            class="arrow"
          >
            ▲
          </span>
        </li>
        <div
          v-if="selectedPost && selectedPost.no === post.no"
          class="post-content"
        >
          <h2>{{selectedPost.title}}</h2>
          <p>{{selectedPost.content}}</p>
          <button @click="editPost()">수정</button>
          <button @click="selectPost(post)">삭제</button>
          <button @click="selectPost(post)">닫기</button>

          <!-- 수정 화면 -->
          <div
            v-if="editPost && selectedPost.no === post.no"
            class="post-content"
          >
            <h2>{{selectedPost.title}}</h2>
            <p>{{selectedPost.content}}</p>
            <button @click="editPost()">수정</button>
            <button @click="selectPost(post)">삭제</button>
            <button @click="selectPost(post)">닫기</button>
          </div>
        </div>
      </ul>
    </div>

    <script>
      const { createApp, ref, computed } = Vue;

      createApp({
        setup() {
          const new_post = ref({
            title: '',
            content: '',
          });
          const posts = ref([
            {
              no: 1,
              title: 'Vue.js 기초 배우기',
              content:
                'Vue.js는 사용자 인터페이스를 구축하기 위한 프로그레시브 프레임워크입니다.',
            },
            {
              no: 2,
              title: '자바스크립트 ES6 문법',
              content:
                'ES6는 JavaScript의 최신 문법을 포함하며, let/const, 화살표 함수, 구조 분해 할당 등을 제공합니다.',
            },
            {
              no: 3,
              title: 'Node.js와 Express',
              content:
                'Node.js는 서버 측에서 JavaScript를 실행할 수 있도록 하는 런타임이며, Express는 이를 위한 경량 웹 프레임워크입니다.',
            },
            {
              no: 4,
              title: 'MongoDB 기본 개념',
              content:
                'MongoDB는 NoSQL 데이터베이스로 JSON과 유사한 문서 기반 데이터를 저장하고 관리할 수 있습니다.',
            },
            {
              no: 5,
              title: '프론트엔드와 백엔드의 차이',
              content:
                '프론트엔드는 사용자가 보는 부분을 개발하는 것이고, 백엔드는 서버와 데이터베이스를 관리하는 부분입니다.',
            },
            {
              no: 6,
              title: '비동기 프로그래밍',
              content:
                'JavaScript의 비동기 처리 방식에는 콜백, 프로미스, async/await가 있습니다.',
            },
            {
              no: 7,
              title: 'Vue Router 사용법',
              content:
                'Vue Router를 사용하면 Vue.js 애플리케이션에서 페이지 이동을 쉽게 처리할 수 있습니다.',
            },
            {
              no: 8,
              title: '컴포넌트 기반 개발',
              content:
                'Vue.js에서는 컴포넌트를 사용하여 UI를 작은 단위로 쪼개서 관리할 수 있습니다.',
            },
            {
              no: 9,
              title: 'CSS와 SCSS 차이점',
              content:
                'SCSS는 CSS의 확장된 버전으로 변수, 중첩, 믹스인 등을 지원합니다.',
            },
            {
              no: 10,
              title: 'Git과 GitHub 사용법',
              content:
                'Git은 버전 관리 시스템이며, GitHub는 이를 활용한 원격 저장소 플랫폼입니다.',
            },
          ]);

          // no 값 내림차순 정렬 (최신순)
          const sortPost = computed(() => {
            return posts.value.sort((a, b) => b.no - a.no);
          });

          // create post
          const addPost = () => {
            // 빈 문자열 예외처리
            if (new_post.value.title === '') {
              alert('제목을 입력해주세요.');
              return;
            }

            if (new_post.value.content === '') {
              alert('내용을 입력해주세요.');
              return;
            }

            posts.value.push({
              no: posts.value[0].no + 1,
              title: new_post.value.title,
              content: new_post.value.content,
            });

            // post 초기화
            new_post.value.title = '';
            new_post.value.content = '';
          };

          // edit post
          const editPost = (post) => {
            if (selectedPost.value == null) {
              selectedPost.value = post;
            } else {
              selectedPost.value = null;
            }
          };

          // 아래에 화면처럼 동작하도록 구현해보세요
          const selectedPost = ref(null);
          const selectPost = (post) => {
            if (selectedPost.value == null) {
              selectedPost.value = post;
            } else {
              selectedPost.value = null;
            }
          };

          return {
            new_post,
            posts,
            selectedPost,
            selectPost,
            sortPost,
            addPost,
            editPost,
          };
        },
      }).mount('#app');
    </script>

    <style>
      h1 {
        text-align: center;
        color: #333;
      }
      ul {
        list-style-type: none;
        padding: 0;
      }
      .post-item {
        cursor: pointer;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: bold;
      }
      .post-item:hover {
        background: #f4f4f4;
      }
      .post-content {
        margin-top: 20px;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 5px;
        background: #fff;
      }
      button {
        margin-top: 10px;
        padding: 5px 10px;
        border: none;
        background: #ff6b6b;
        color: white;
        cursor: pointer;
        border-radius: 3px;
      }
      button:hover {
        background: #ff4f4f;
      }

      .arrow {
        font-size: 0.8em;
        color: #888;
      }

      .data-post {
        display: flex;
        justify-content: center;
        gap: 10px;
      }
    </style>
  </body>
</html>
