<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callNtimes(n, callback) {
        for (let i = 1; i < n; i++) {
          callback();
        }
      }
      let fun = function () {
        alert('함수 호출');
      };
      callNtimes(10, fun);
    </script>
  </head>

  <body></body>
</html>
