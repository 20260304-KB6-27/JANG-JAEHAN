<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      let date = new Date();
      let hours = date.getHours();
      if (hours < 5) {
        alert('5시 미만 : 잠을 자렴...');
      } else if (hours < 7) {
        alert('5시 이상 7시 미만: 준비');
      } else if (hours < 9) {
        alert('7시 이상 9시 미만: 출근');
      } else if (hours < 12) {
        alert('9시 이상 12시 미만: 빈둥 빈둥');
      } else if (hours < 14) {
        alert('12시 이상 14시 미만: 식사');
      } else {
        alert('14시 이상: 여러 가지 업무를 수행합니다.');
      }
    </script>
  </head>

  <body></body>
</html>
