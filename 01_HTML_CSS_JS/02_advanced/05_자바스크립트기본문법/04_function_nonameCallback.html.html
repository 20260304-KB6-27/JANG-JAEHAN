<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      function callNtimes(n, callback) {
        for (let i = 1; i < n; i++) {
          callback();
        }
      }
      callNtimes(10, function () {
        alert('함수 호출');
      });
    </script>
  </head>

  <body></body>
</html>
