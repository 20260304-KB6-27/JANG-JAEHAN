<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <th>
              <label for="userid">사용자 ID</label>
            </th>
            <td><input id="userid" name="userid" type="text" /></td>
          </tr>
          <tr>
            <th>
              <label for="password">비밀번호</label>
            </th>
            <td><input id="password" name="password" type="password" /></td>
          </tr>
          <tr>
            <th>
              <label for="password_chk">비밀번호 확인</label>
            </th>
            <td>
              <input id="password_chk" name="password_chk" type="password" />
            </td>
          </tr>
          <tr>
            <th>
              <label for="username">이름</label>
            </th>
            <td><input id="username" name="username" type="text" /></td>
          </tr>
          <tr>
            <th>성별</th>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남자</label>
              <input id="woman" type="radio" name="gender" value="w" />
              <label for="woman">여자</label>
            </td>
          </tr>
          <tr>
            <th>취미</th>
            <td>
              <input id="soccer" type="checkbox" name="hobby" value="soccer" />
              <label for="soccer">축구</label>
              <input
                id="baseball"
                type="checkbox"
                name="hobby"
                value="baseball"
              />
              <label for="baseball">야구</label>
              <input
                id="volleyball"
                type="checkbox"
                name="hobby"
                value="volleyball"
              />
              <label for="volleyball">배구</label>
              <input
                id="basketball"
                type="checkbox"
                name="hobby"
                value="basketball"
              />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <th>
              <label for="useremail">email</label>
            </th>
            <td><input id="useremail" name="useremail" type="email" /></td>
          </tr>
          <tr>
            <th>
              <label for="role">역할</label>
            </th>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
